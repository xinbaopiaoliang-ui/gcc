name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.3.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          SUFFIX: ${{ matrix.suffix }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${DISPATCH_TAG}"
          fi
          VERSION="${TAG#v}"
          PKG="gaccel-node_${VERSION}_${SUFFIX}"

          mkdir -p "dist/${PKG}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${PKG}/gaccel-node" ./cmd/server
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${PKG}/gaccel-probe" ./cmd/gaccel-probe
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${PKG}/gaccel-token" ./cmd/gaccel-token
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${PKG}/gaccel-token-api" ./cmd/gaccel-token-api

          cp config.example.yaml "dist/${PKG}/config.example.yaml"
          cp token-api.example.yaml "dist/${PKG}/token-api.example.yaml"
          mkdir -p "dist/${PKG}/deployments" "dist/${PKG}/docs"
          cp deployments/gaccel-node.service "dist/${PKG}/deployments/gaccel-node.service"
          cp deployments/gaccel-token-api.service "dist/${PKG}/deployments/gaccel-token-api.service"
          mkdir -p "dist/${PKG}/scripts"
          cp scripts/install.sh "dist/${PKG}/scripts/install.sh"
          chmod +x "dist/${PKG}/scripts/install.sh"
          cp docs/protocol.md "dist/${PKG}/docs/protocol.md"
          cp docs/deploy.md "dist/${PKG}/docs/deploy.md"
          cp docs/token-api.md "dist/${PKG}/docs/token-api.md"
          cp docs/rust-client.md "dist/${PKG}/docs/rust-client.md"
          cp README.md "dist/${PKG}/README.md"

          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          rm -rf "dist/${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaccel-${{ matrix.suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  steam-demo:
    name: Build Windows Steam demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows package
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${DISPATCH_TAG}"
          fi
          VERSION="${TAG#v}"
          PKG="gaccel-steam-demo_${VERSION}_windows-amd64"

          mkdir -p "dist/${PKG}"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}-demo" -o "dist/${PKG}/gaccel-steam-demo.exe" ./cmd/gaccel-steam-demo
          cp packaging/steam-demo/README.txt "dist/${PKG}/README.txt"
          cp packaging/steam-demo/steam-demo-config.json "dist/${PKG}/steam-demo-config.json"
          sed -i "s/\"client_version\": \"dev-demo\"/\"client_version\": \"${VERSION}-demo\"/" "dist/${PKG}/steam-demo-config.json"

          (cd dist && zip -r "${PKG}.zip" "${PKG}")
          rm -rf "dist/${PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaccel-steam-demo-windows-amd64
          path: dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - release
      - steam-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${DISPATCH_TAG}"
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --title "${TAG}" --generate-notes
          fi
